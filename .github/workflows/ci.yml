name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  minimal:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core + pytest only
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Core tests (no torch / transformers)
        run: pytest tests/test_protocols.py tests/test_registry.py -q --tb=short

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with DL, UI, and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dl,ui,dev]"

      - name: Run full test suite
        run: pytest tests/ -q --tb=short
